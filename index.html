<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravegrain</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Toolbar: minimal, thumb-reachable, fixed at bottom (GDD §12.3, §12.4) */
    #toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tool-btn {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: bold;
      border: 2px solid #666;
      background: #333;
      color: #ccc;
      cursor: pointer;
      border-radius: 4px;
      min-width: 4rem;
      text-align: center;
      transition: all 0.2s;
      user-select: none;
      -webkit-user-select: none;
    }

    .tool-btn:hover {
      background: #444;
      border-color: #999;
    }

    /* Active tool: highlighted (GDD §12.3: highlight the active mode) */
    .tool-btn.active {
      background: #00aa00;
      color: #000;
      border-color: #00ff00;
      box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
    }

    /* Disabled toolbar button: greyed-out when unaffordable (task 8-4, GDD §8) */
    .tool-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Role-assign menu overlay (shown when a survivor is tapped in Assign mode) */
    #role-menu {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 20, 0.92);
      border: 2px solid #666;
      border-radius: 8px;
      padding: 1rem;
      z-index: 200;
      min-width: 12rem;
      touch-action: none;
    }
    #role-menu-title {
      color: #ccc;
      font-weight: bold;
      font-size: 0.95rem;
      margin-bottom: 0.6rem;
      text-align: center;
      font-family: monospace;
    }
    #role-menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .role-menu-btn {
      width: 100%;
    }
    .role-menu-btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      background: #222;
      border-color: #444;
      color: #777;
    }

    /* Stockpile readout (top-centre HUD) */
    #stockpile-readout {
      position: fixed;
      top: 0.4rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.72);
      color: #ccc;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: monospace;
      z-index: 100;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Toolbar: Pan, Sand, Stone, Water, Dirt, Wood, Foliage, Ignite, Erase -->
  <!-- GDD §12.3: persistent, thumb-reachable toolbar. GDD §12.4: big, no hover dependence -->
  <div id="toolbar">
    <button class="tool-btn" data-tool="pan" title="Pan mode: drag to scroll">Pan</button>
    <button class="tool-btn" data-tool="paint" data-material="1" title="Paint sand">Sand</button>
    <button class="tool-btn" data-tool="paint" data-material="2" title="Paint stone">Stone</button>
    <button class="tool-btn" data-tool="paint" data-material="3" title="Paint water">Water</button>
    <button class="tool-btn" data-tool="paint" data-material="4" title="Paint dirt">Dirt</button>
    <button class="tool-btn" data-tool="paint" data-material="6" title="Paint wood">Wood</button>
    <button class="tool-btn" data-tool="paint" data-material="7" title="Paint foliage">Foliage</button>
    <button class="tool-btn" data-tool="build" data-structure="fence" title="Place wood fence (costs 1 wood/cell)">Fence</button>
    <button class="tool-btn" data-tool="build" data-structure="wall" title="Place stone wall (costs 1 stone/cell)">Wall</button>
    <button class="tool-btn" data-tool="ignite" title="Ignite flammable cells (wood/foliage only)">Ignite</button>
    <button class="tool-btn" data-tool="shoot" title="Shoot a body region">Shoot</button>
    <button class="tool-btn" data-tool="assign" title="Assign a role to a survivor (tap them in Assign mode)">Assign</button>
    <button class="tool-btn" data-tool="paint" data-material="0" title="Erase (paint air)">Erase</button>
    <button class="tool-btn" id="speed-btn" title="Cycle simulation speed (1× 2× 3×)">1×</button>
  </div>

  <!-- Role-assignment overlay (p6-t5, GDD §6.2). Shown when a survivor is tapped in Assign mode. -->
  <div id="role-menu">
    <div id="role-menu-title">Assign Role</div>
    <div id="role-menu-buttons">
      <button class="tool-btn role-menu-btn" data-role="lumberjack">Lumberjack</button>
      <button class="tool-btn role-menu-btn" data-role="miner">Miner</button>
      <button class="tool-btn role-menu-btn" data-role="forager">Forager</button>
      <button class="tool-btn role-menu-btn" data-role="guard">Guard</button>
      <button class="tool-btn role-menu-btn" data-role="none">Unassign</button>
    </div>
  </div>

  <!-- Stockpile readout HUD (p6-t5, GDD §8). Updated every render frame by main.ts. -->
  <div id="stockpile-readout">Wood 0  Stone 0  Food 0  Ore 0</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
