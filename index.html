<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravegrain</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Toolbar: minimal, thumb-reachable, fixed at bottom (GDD §12.3, §12.4) */
    #toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Debug tools panel — hidden until the Debug toggle is tapped (playtest R9).
       Holds developer-only verbs (Shoot, Ignite, Plan Fence/Wall, Campfire,
       Door) so the main toolbar stays focused on the player-facing tools.
       Floats just above the main toolbar. */
    #debug-menu {
      display: none;
      position: fixed;
      bottom: 4rem;
      left: 0;
      right: 0;
      gap: 0.5rem;
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.82);
      z-index: 99;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tool-btn {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: bold;
      border: 2px solid #666;
      background: #333;
      color: #ccc;
      cursor: pointer;
      border-radius: 4px;
      /* 10-2: ≥44×44px tap targets (GDD §12.4, Apple HIG, WCAG 2.5.5) */
      min-width: 44px;
      min-height: 44px;
      text-align: center;
      transition: all 0.2s;
      user-select: none;
      -webkit-user-select: none;
    }

    .tool-btn:hover {
      background: #444;
      border-color: #999;
    }

    /* Active tool: highlighted (GDD §12.3: highlight the active mode) */
    .tool-btn.active {
      background: #00aa00;
      color: #000;
      border-color: #00ff00;
      box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
    }

    /* Disabled toolbar button: greyed-out when unaffordable (task 8-4, GDD §8) */
    .tool-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Role-assign menu overlay (shown when a survivor is tapped in Assign mode) */
    #role-menu {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 20, 0.92);
      border: 2px solid #666;
      border-radius: 8px;
      padding: 1rem;
      z-index: 200;
      min-width: 12rem;
      touch-action: none;
    }
    #role-menu-title {
      color: #ccc;
      font-weight: bold;
      font-size: 0.95rem;
      margin-bottom: 0.6rem;
      text-align: center;
      font-family: monospace;
    }
    #role-menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .role-menu-btn {
      width: 100%;
    }
    .role-menu-btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      background: #222;
      border-color: #444;
      color: #777;
    }

    /* 10-1: Rotate-device prompt — shown only in portrait via CSS media query (GDD §12.4) */
    #rotate-prompt {
      display: none; /* hidden by default (desktop/landscape are always safe) */
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.92);
      color: #eee;
      font-size: clamp(1.2rem, 5vw, 2rem);
      font-family: monospace;
      font-weight: bold;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      pointer-events: none; /* game canvas/loop keeps running underneath */
    }

    @media (orientation: portrait) {
      #rotate-prompt {
        display: flex; /* reveal overlay in portrait */
      }
    }

    @media (orientation: landscape) {
      #rotate-prompt {
        display: none; /* explicit: hidden in landscape (desktop always lands here) */
      }
    }

    /* 10-2: Short landscape phone (e.g. iPhone SE landscape: ~375px tall).
       Shrink toolbar padding/font so all buttons remain visible & thumb-reachable.
       #toolbar already has flex-wrap:wrap so buttons spill to a 2nd row rather than overflow. */
    @media (max-height: 480px) {
      .tool-btn {
        padding: 0.35rem 0.55rem;
        font-size: 0.78rem;
        min-width: 44px;   /* keep tap-target floor even when shrunk */
        min-height: 44px;
      }
      #toolbar {
        gap: 0.3rem;
        padding: 0.3rem;
      }
    }

    /* Stockpile readout (top-centre HUD).
       Sits BELOW the 16px canvas-drawn minimap strip (ui.MINIMAP_HEIGHT_PX;
       playtest R9: "top UI overlaps the navigation map bar"). */
    #stockpile-readout {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.72);
      color: #ccc;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: monospace;
      z-index: 100;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- 10-1: Portrait rotate-device overlay. Pure CSS @media(orientation:portrait) reveals it.
       pointer-events:none so the game canvas keeps running underneath — no JS needed. -->
  <div id="rotate-prompt">&#8635; Rotate your device to landscape</div>

  <!-- Toolbar: Pan, Sand, Stone, Water, Dirt, Wood, Plant (sapling), Ignite, Erase -->
  <!-- GDD §12.3: persistent, thumb-reachable toolbar. GDD §12.4: big, no hover dependence -->
  <div id="toolbar">
    <button class="tool-btn" data-tool="pan" title="Pan mode: drag to scroll. Tap a survivor to assign a role.">Pan</button>
    <button class="tool-btn" data-tool="flag" title="Plant the camp flag — survivors only build camp at (and after) the flag; move it and they relocate">&#9873; Flag</button>
    <button class="tool-btn" data-tool="paint" data-material="1" title="Paint sand (free terraforming)">Sand</button>
    <button class="tool-btn" data-tool="paint" data-material="3" title="Paint water (free terraforming)">Water</button>
    <button class="tool-btn" data-tool="paint" data-material="4" title="Paint dirt (free terraforming)">Dirt</button>
    <button class="tool-btn" data-tool="paint" data-material="15" title="Plant a seed — grows into foliage">Plant</button>
    <!-- Wood/Stone are NOT free paints: place them as costed, breachable structures (playtest #6/#7). -->
    <button class="tool-btn" data-tool="build" data-structure="fence" title="Place wood (costs 1 wood/cell; a flammable fence, zombies breach it fast)">Wood</button>
    <button class="tool-btn" data-tool="build" data-structure="wall" title="Place stone (costs 1 stone/cell; a wall, zombies breach it slowly)">Stone</button>
    <button class="tool-btn" data-tool="paint" data-material="0" title="Erase (paint air)">Erase</button>
    <button class="tool-btn" id="debug-toggle" title="Show / hide developer tools (Shoot, Ignite, Plan, Campfire, Door)">Debug</button>
    <button class="tool-btn" id="speed-btn" title="Cycle simulation speed (1× 2× 3×)">1×</button>
  </div>

  <!-- Debug tools panel (playtest R9): developer-only verbs, hidden behind the Debug toggle. -->
  <div id="debug-menu">
    <button class="tool-btn" data-tool="shoot" title="Shoot a body region">Shoot</button>
    <button class="tool-btn" data-tool="ignite" title="Ignite flammable cells (wood/foliage only)">Ignite</button>
    <button class="tool-btn" data-tool="plan" data-structure="fence" title="Queue a fence blueprint for builders to construct">Plan Fence</button>
    <button class="tool-btn" data-tool="plan" data-structure="wall" title="Queue a wall blueprint for builders to construct">Plan Wall</button>
    <button class="tool-btn" data-tool="build" data-structure="campfire" title="Place a campfire (costs 3 wood; a long-burning hearth that warms survivors without spreading)">Campfire</button>
    <button class="tool-btn" data-tool="build" data-structure="door" title="Place a door (costs 2 wood; survivors walk through, zombies must gnaw it down)">Door</button>
  </div>

  <!-- Role-assignment overlay (p6-t5, GDD §6.2). Shown when a survivor is tapped in Assign mode. -->
  <div id="role-menu">
    <div id="role-menu-title">Assign Role</div>
    <div id="role-menu-buttons">
      <button class="tool-btn role-menu-btn" data-role="lumberjack">Lumberjack</button>
      <button class="tool-btn role-menu-btn" data-role="miner">Miner</button>
      <button class="tool-btn role-menu-btn" data-role="forager">Forager</button>
      <button class="tool-btn role-menu-btn" data-role="guard">Guard</button>
      <button class="tool-btn role-menu-btn" data-role="builder">Builder</button>
      <button class="tool-btn role-menu-btn" data-role="none">Unassign</button>
    </div>
  </div>

  <!-- Stockpile readout HUD (p6-t5, GDD §8). Updated every render frame by main.ts. -->
  <div id="stockpile-readout">Wood 0  Stone 0  Food 0  Ore 0</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
